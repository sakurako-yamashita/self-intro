<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>競合動画分析｜Gemini</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet" />
    <!-- Gemini JS SDK（ブラウザ用・ESM）。importmap で解決し modulepreload で先読み -->
    <link rel="modulepreload" href="https://esm.sh/@google/generative-ai" crossorigin="anonymous" />
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.sh/@google/generative-ai"
        }
      }
    </script>
    <style>
      :root {
        --bg: #0f1419;
        --card: #1a2332;
        --accent: #38bdf8;
        --accent2: #a78bfa;
        --muted: #94a3b8;
        --text: #e2e8f0;
        --border: rgba(148, 163, 184, 0.2);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Noto Sans JP", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.55;
        padding: 24px 16px 48px;
      }
      .wrap { max-width: 960px; margin: 0 auto; }
      h1 {
        font-size: 1.35rem;
        font-weight: 700;
        text-align: center;
        margin: 0 0 8px 0;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .lead {
        text-align: center;
        color: var(--muted);
        font-size: 0.85rem;
        margin: 0 0 24px 0;
        max-width: 640px;
        margin-left: auto;
        margin-right: auto;
      }
      .block {
        background: var(--card);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        border: 1px solid var(--border);
      }
      .block h2 {
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--accent);
        margin: 0 0 12px 0;
        letter-spacing: 0.04em;
      }
      label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
      input[type="url"],
      input[type="text"],
      input[type="password"] {
        width: 100%;
        max-width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(0,0,0,0.2);
        color: var(--text);
        font-family: inherit;
        font-size: 0.9rem;
      }
      textarea {
        width: 100%;
        min-height: 140px;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(0,0,0,0.2);
        color: var(--text);
        font-family: inherit;
        font-size: 0.9rem;
        resize: vertical;
      }
      .field { margin-bottom: 16px; }
      .field:last-child { margin-bottom: 0; }
      .key-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
      .key-row .field { flex: 1; min-width: 200px; margin-bottom: 0; }
      .btn-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 16px; }
      button.primary {
        padding: 12px 24px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), #6366f1);
        color: #fff;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
      }
      button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
      button.secondary {
        padding: 10px 18px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(0,0,0,0.2);
        color: var(--text);
        font-family: inherit;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary:hover { border-color: var(--accent); color: var(--accent); }
      .save-hint {
        font-size: 0.78rem;
        color: var(--muted);
        margin-top: 8px;
      }

      .compare-wrap { overflow-x: auto; margin-top: 8px; }
      table.compare {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.88rem;
      }
      .compare th,
      .compare td {
        border: 1px solid var(--border);
        padding: 12px;
        vertical-align: top;
        text-align: left;
      }
      .compare th {
        background: rgba(56, 189, 248, 0.12);
        color: var(--accent);
        font-weight: 700;
        width: 18%;
      }
      .compare th.col-ai { width: 41%; }
      .compare th.col-mine { width: 41%; }
      .compare td.ai-cell {
        background: rgba(167, 139, 250, 0.06);
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .compare td.ai-cell.loading { color: var(--muted); }
      .compare textarea.mine-cell {
        width: 100%;
        min-height: 88px;
        margin: 0;
        border: none;
        background: rgba(0,0,0,0.25);
        color: var(--text);
        font-family: inherit;
        font-size: 0.88rem;
        padding: 8px;
        border-radius: 8px;
        resize: vertical;
      }
      footer {
        text-align: center;
        margin-top: 24px;
        font-size: 0.75rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>競合動画 比較分析</h1>
      <p class="lead">
        Google AI Studio の API キーを保存し、タイトル・概要欄を貼って「分析実行」。Gemini が4項目を JSON で返し、左列に表示します（リロードなし）。
      </p>

      <section class="block">
        <h2>Gemini API キー</h2>
        <div class="key-row">
          <div class="field" style="flex:1;min-width:240px;">
            <label for="gemini-key">API キー</label>
            <input type="password" id="gemini-key" autocomplete="off" placeholder="Google AI Studio で発行したキー" />
          </div>
          <button type="button" class="secondary" id="btn-save-key">APIキーを保存</button>
        </div>
        <p class="save-hint" id="save-hint"></p>
      </section>

      <section class="block">
        <h2>入力</h2>
        <div class="field">
          <label for="video-url">YouTube URL（任意）</label>
          <input type="url" id="video-url" placeholder="https://www.youtube.com/watch?v=..." />
        </div>
        <div class="field">
          <label for="video-text">タイトル・概要欄（必須）</label>
          <textarea id="video-text" placeholder="ここにコピペしてください。"></textarea>
        </div>
        <div class="btn-row">
          <button type="button" class="primary" id="btn-run">分析実行</button>
        </div>
      </section>

      <section class="block">
        <h2>比較表</h2>
        <div class="compare-wrap">
          <table class="compare">
            <thead>
              <tr>
                <th scope="col">項目</th>
                <th scope="col" class="col-ai">競合（AI分析）</th>
                <th scope="col" class="col-mine">自分の構想案</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th scope="row">ターゲット層</th>
                <td class="ai-cell loading" id="ai-target">—</td>
                <td><textarea class="mine-cell" id="mine-target" placeholder="自分の案"></textarea></td>
              </tr>
              <tr>
                <th scope="row">動画のテンポ</th>
                <td class="ai-cell loading" id="ai-tempo">—</td>
                <td><textarea class="mine-cell" id="mine-tempo" placeholder="自分の案"></textarea></td>
              </tr>
              <tr>
                <th scope="row">視覚的工夫</th>
                <td class="ai-cell loading" id="ai-visual">—</td>
                <td><textarea class="mine-cell" id="mine-visual" placeholder="自分の案"></textarea></td>
              </tr>
              <tr>
                <th scope="row">メッセージの本質</th>
                <td class="ai-cell loading" id="ai-message">—</td>
                <td><textarea class="mine-cell" id="mine-message" placeholder="自分の案"></textarea></td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <footer>competitor-analyzer.html · ブラウザから Gemini 直接</footer>
    </div>

    <script type="module">
      import { GoogleGenerativeAI } from "@google/generative-ai";

      const LS_KEY = "competitor_analyzer_gemini_api_key";
      /** 固定モデル（変更しない） */
      const MODEL_ID = "gemini-1.5-flash";

      const keyInput = document.getElementById("gemini-key");
      const saveHint = document.getElementById("save-hint");
      const urlInput = document.getElementById("video-url");
      const textInput = document.getElementById("video-text");
      const btnRun = document.getElementById("btn-run");

      const cells = {
        targetAudience: document.getElementById("ai-target"),
        videoTempo: document.getElementById("ai-tempo"),
        visualCraft: document.getElementById("ai-visual"),
        messageEssence: document.getElementById("ai-message"),
      };

      function loadKey() {
        const v = localStorage.getItem(LS_KEY);
        if (v) keyInput.value = v;
      }
      loadKey();

      document.getElementById("btn-save-key").addEventListener("click", () => {
        const v = keyInput.value.trim();
        if (v) {
          localStorage.setItem(LS_KEY, v);
          saveHint.textContent = "保存しました。このブラウザに保持されます。";
        } else {
          localStorage.removeItem(LS_KEY);
          saveHint.textContent = "キーを空にして保存したため、保存を解除しました。";
        }
        setTimeout(() => { saveHint.textContent = ""; }, 3500);
      });

      function setLoading(loading) {
        btnRun.disabled = loading;
        Object.values(cells).forEach((el) => el.classList.toggle("loading", loading));
      }

      btnRun.addEventListener("click", async () => {
        const apiKey = (keyInput.value.trim() || localStorage.getItem(LS_KEY) || "").trim();
        const text = (textInput.value || "").trim();
        if (!apiKey) {
          console.warn(
            "[competitor-analyzer] API キーがありません。入力するか「APIキーを保存」してください。"
          );
          return;
        }
        if (!text) {
          console.warn("[competitor-analyzer] タイトル・概要欄が空です。");
          return;
        }

        const url = (urlInput.value || "").trim();
        const userContent = url
          ? `【参考URL】\n${url}\n\n【タイトル・概要欄など】\n${text}`
          : `【タイトル・概要欄など】\n${text}`;

        const instruction = `次の入力は YouTube 動画に関するテキストです。次の4キーだけを持つ JSON オブジェクト1つだけを返してください。説明文やマークダウンは付けないでください。
{
  "targetAudience": "ターゲット層（年齢・悩み・属性など）",
  "videoTempo": "動画のテンポ（早さ・間・ナレーションの特徴など）",
  "visualCraft": "視覚的工夫（テロップ・図解・画角など）",
  "messageEssence": "メッセージの本質"
}
各値は日本語で、200文字程度以内を目安に。情報不足の場合は「情報不足」と書いてください。`;

        setLoading(true);
        Object.values(cells).forEach((el) => {
          el.textContent = "…";
        });

        try {
          const genAI = new GoogleGenerativeAI(apiKey);
          const model = genAI.getGenerativeModel({
            model: MODEL_ID,
            generationConfig: {
              temperature: 0.35,
              responseMimeType: "application/json",
            },
          });

          const fullPrompt = instruction + "\n\n--- 入力 ---\n\n" + userContent;
          const result = await model.generateContent({
            contents: [{ role: "user", parts: [{ text: fullPrompt }] }],
          });

          const raw = result.response.text();
          let data;
          try {
            data = JSON.parse(raw.trim());
          } catch {
            const m = raw.match(/\{[\s\S]*\}/);
            data = m ? JSON.parse(m[0]) : {};
          }

          cells.targetAudience.textContent = data.targetAudience || "情報不足";
          cells.videoTempo.textContent = data.videoTempo || "情報不足";
          cells.visualCraft.textContent = data.visualCraft || "情報不足";
          cells.messageEssence.textContent = data.messageEssence || "情報不足";
        } catch (e) {
          cells.targetAudience.textContent = "—";
          cells.videoTempo.textContent = "—";
          cells.visualCraft.textContent = "—";
          cells.messageEssence.textContent = "—";
          console.error("[competitor-analyzer] Gemini 分析エラー（詳細は下記）:", e);
          if (e instanceof Error) {
            console.error("name:", e.name, "message:", e.message);
            if (e.stack) console.error("stack:\n", e.stack);
          }
          if (e && typeof e === "object") {
            const extra = ["status", "statusText", "errorDetails", "response"].filter(
              (k) => k in e
            );
            extra.forEach((k) => {
              try {
                console.error(k + ":", e[k]);
              } catch (_) {
                /* ignore */
              }
            });
          }
          if (e instanceof Error && e.cause != null) {
            console.error("cause:", e.cause);
          }
        } finally {
          Object.values(cells).forEach((el) => el.classList.remove("loading"));
          btnRun.disabled = false;
        }
      });
    </script>
  </body>
</html>
